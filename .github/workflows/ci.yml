name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── Type checking ─────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

  # ── Linting ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Unit & Integration Tests ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_adviserai"
      AUTH0_SECRET: "test_secret_32_characters_minimum"
      AUTH0_BASE_URL: "http://localhost:3000"
      AUTH0_ISSUER_BASE_URL: "https://test.us.auth0.com"
      AUTH0_CLIENT_ID: "test_client_id"
      AUTH0_CLIENT_SECRET: "test_client_secret"
      GEMINI_API_KEY: "test_gemini_key"
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
      BLOB_READ_WRITE_TOKEN: "test_blob_token"
      RESEND_API_KEY: ""
      SENTRY_DSN: ""
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build check ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_adviserai"
      AUTH0_SECRET: "test_secret_32_characters_minimum"
      AUTH0_BASE_URL: "http://localhost:3000"
      AUTH0_ISSUER_BASE_URL: "https://test.us.auth0.com"
      AUTH0_CLIENT_ID: "test_client_id"
      AUTH0_CLIENT_SECRET: "test_client_secret"
      GEMINI_API_KEY: "test_gemini_key"
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
      BLOB_READ_WRITE_TOKEN: "test_blob_token"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
