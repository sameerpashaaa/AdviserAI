<svg viewBox="0 0 540 140" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Adviser AI logo</title>
  <defs>
    <linearGradient id="onyx-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Mark (Strategic Apex Compass & Agent Network) -->
  <g transform="translate(10, 10)">
    <!-- Outer Hexagon Matrix -->
    <polygon points="60,5 110,33 110,87 60,115 10,87 10,33" fill="url(#onyx-grad)" stroke="#44403c" stroke-width="1.5"/>
    
    <!-- Geometric Triangles / Facets -->
    <polygon points="60,5 10,33 60,60" fill="#292524" opacity="0.8"/>
    <polygon points="60,5 110,33 60,60" fill="#44403c" opacity="0.5"/>
    <polygon points="10,33 60,60 10,87" fill="#1c1917"/>
    <polygon points="110,33 60,60 110,87" fill="#292524"/>
    
    <!-- Central Gold Diamond (Apex Compass Needle) -->
    <polygon points="60,18 82,60 60,102 38,60" fill="url(#gold-grad)"/>
    <polygon points="60,18 60,102 38,60" fill="#b45309" opacity="0.35"/>
    
    <!-- Node Network Connections -->
    <line x1="60" y1="18" x2="10" y2="33" stroke="#f59e0b" stroke-width="1.2" opacity="0.7"/>
    <line x1="60" y1="18" x2="110" y2="33" stroke="#f59e0b" stroke-width="1.2" opacity="0.7"/>
    <line x1="60" y1="102" x2="10" y2="87" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
    <line x1="60" y1="102" x2="110" y2="87" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>

    <!-- Agent Nodes -->
    <circle cx="60" cy="5" r="4" fill="url(#gold-light)" filter="url(#glow)"/>
    <circle cx="110" cy="33" r="3.5" fill="#d97706"/>
    <circle cx="10" cy="33" r="3.5" fill="#d97706"/>
    <circle cx="110" cy="87" r="3.5" fill="#78716c"/>
    <circle cx="10" cy="87" r="3.5" fill="#78716c"/>
    <circle cx="60" cy="115" r="4" fill="url(#gold-light)"/>
    
    <!-- Center Core Intelligence Orb -->
    <circle cx="60" cy="60" r="5.5" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="60" cy="60" r="2.5" fill="#0c0a09"/>
  </g>

  <!-- Typography -->
  <!-- Main Title -->
  <text x="145" y="72" style="fill:#0c0a09; font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size:52px; font-weight:800; letter-spacing:-1.5px;">Adviser <tspan style="fill:url(#gold-grad); font-weight:900;">AI</tspan></text>
  
  <!-- Subtitle -->
  <text x="148" y="100" style="fill:#78716c; font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size:15px; font-weight:600; letter-spacing:4.5px;">STRATEGIC INTELLIGENCE</text>
  
  <!-- Decorative Divider Accent -->
  <rect x="148" y="109" width="370" height="2" rx="1" fill="url(#gold-grad)" opacity="0.85"/>
</svg>
