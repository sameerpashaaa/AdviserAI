<svg viewBox="0 0 540 140" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Adviser AI logo</title>
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- High-End Monogram Logo Mark (A & I Interlocking Serif Monogram) -->
  <g transform="translate(15, 10)">
    <!-- Standalone Monogram Frame (Centered around 55, 60) -->
    
    <!-- 1. LETTER 'I' -->
    <!-- Top & Bottom Serifs + Fillets + Central Column -->
    <path d="
      M 28 15 
      H 82 
      C 73 15 67 22 67 32 
      V 88 
      C 67 98 73 105 82 105 
      H 28 
      C 37 105 43 98 43 88 
      V 32 
      C 43 22 37 15 28 15 Z
    " fill="#0c0a09" />

    <!-- 2. KNOCKOUT GAP (White / BG contour around overlapping strokes of 'A') -->
    <!-- Apex & Slants knockout -->
    <path d="
      M 55 24 L 20 105
      M 55 24 L 90 105
      M 34 68 H 76
    " stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- 3. LETTER 'A' -->
    <!-- Left Thin Hairline Leg of A -->
    <path d="M 55 23 L 20 105" stroke="#0c0a09" stroke-width="2.8" stroke-linecap="butt" />
    <!-- Left Serif Foot -->
    <path d="M 12 105 H 28 C 24 105 21 103 20 100" stroke="#0c0a09" stroke-width="2" fill="none" />

    <!-- Right Heavy Thick Stem of A -->
    <path d="
      M 53 23 
      L 58 23 
      L 93 105 
      H 81 
      Z
    " fill="#0c0a09" />
    <!-- Right Serif Foot -->
    <path d="M 75 105 H 100 C 95 105 92 103 91 100" stroke="#0c0a09" stroke-width="2" fill="none" />

    <!-- Apex Arch Connection -->
    <path d="
      M 55 20 
      C 52 20 49 24 49 28 
      C 49 32 52 35 55 35 
      C 58 35 61 32 61 28 
      C 61 24 58 20 55 20 Z
    " fill="#0c0a09" opacity="0.9"/>

    <!-- A Crossbar -->
    <path d="M 36 68 H 74" stroke="#0c0a09" stroke-width="3" stroke-linecap="square" />
  </g>

  <!-- Typography -->
  <g transform="translate(145, 0)">
    <text x="0" y="72" style="fill:#0c0a09; font-family:'Playfair Display', 'Bodoni MT', 'Didot', 'Georgia', serif; font-size:48px; font-weight:700; letter-spacing:-0.5px;">Adviser <tspan style="fill:url(#gold-grad); font-family:'Inter', sans-serif; font-weight:800; letter-spacing:0px;">AI</tspan></text>
    <text x="2" y="98" style="fill:#78716c; font-family:'Inter', -apple-system, sans-serif; font-size:13px; font-weight:600; letter-spacing:4.5px;">STRATEGIC INTELLIGENCE</text>
    <rect x="2" y="107" width="360" height="2" rx="1" fill="url(#gold-grad)" opacity="0.85"/>
  </g>
</svg>